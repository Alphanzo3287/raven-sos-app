<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Raven SOS</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --raven:#0A0F1E;--midnight:#111827;--ink:#F8FAFC;--blue:#2563EB;--red:#E53935;--green:#22C55E;--amber:#F5A623;
  --muted:#8B98B4;--muted-2:#5C6B8A;--line:rgba(255,255,255,.08);--line-strong:rgba(255,255,255,.14);
  --card:linear-gradient(180deg,#141d33,#0f172a);--font:"Inter",-apple-system,system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--raven);color:var(--ink);-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(900px 500px at 80% -10%,rgba(37,99,235,.14),transparent),radial-gradient(700px 400px at 0% 15%,rgba(229,57,53,.06),transparent);
  min-height:100vh;overflow-x:hidden}
#app{max-width:460px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;
  padding-bottom:env(safe-area-inset-bottom)}
button{font-family:var(--font);cursor:pointer}
.btn{display:block;width:100%;padding:16px;border-radius:16px;border:none;font-size:15px;font-weight:800;letter-spacing:.3px}
.btn.blue{background:var(--blue);color:#fff;box-shadow:0 14px 30px -12px rgba(37,99,235,.7)}
.btn.red{background:var(--red);color:#fff;box-shadow:0 14px 30px -12px rgba(229,57,53,.7)}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line-strong)}
.btn:disabled{opacity:.5}
input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid var(--line);background:#0d1526;color:var(--ink);
  font-family:var(--font);font-size:15px;margin-top:8px}
label{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.3px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 6px}
.hdr .brandmark{display:flex;align-items:center;gap:10px}
.hdr img{width:34px;height:34px;border-radius:8px}
.hdr .n{font-weight:800;letter-spacing:1.5px;font-size:13px}.hdr .n span{color:var(--red)}
.hdr .gear{color:var(--muted);font-size:20px;background:none;border:none}
.content{flex:1;display:flex;flex-direction:column}
.pad{padding:8px 20px 20px}
.greet{color:var(--muted);font-size:15px}.name{font-size:28px;font-weight:800;letter-spacing:-.5px}
.protected{display:inline-flex;align-items:center;gap:7px;margin-top:10px;background:rgba(34,197,94,.12);color:var(--green);
  border:1px solid rgba(34,197,94,.25);padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700}
.protected .d{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
.sosZone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:280px}
.orb{position:relative;width:210px;height:210px;border-radius:50%;display:flex;align-items:center;justify-content:center;touch-action:none;user-select:none}
.orb .core{position:absolute;inset:28px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#ff6a6a,#e53935 60%,#b71c1c);
  box-shadow:0 18px 50px -8px rgba(229,57,53,.6),inset 0 2px 10px rgba(255,255,255,.35);display:flex;flex-direction:column;
  align-items:center;justify-content:center;color:#fff;animation:breathe 3.4s ease-in-out infinite}
.orb .core .lbl{font-size:26px;font-weight:900;letter-spacing:1px}.orb .core .sub{font-size:10px;font-weight:700;opacity:.85;letter-spacing:1.5px;margin-top:3px}
.ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(229,57,53,.5);animation:sonar 3.4s ease-out infinite}
.ring.r2{animation-delay:1.1s}.ring.r3{animation-delay:2.2s}
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}
@keyframes sonar{0%{transform:scale(.7);opacity:.8}100%{transform:scale(1.28);opacity:0}}
.holdRing{position:absolute;inset:0;transform:rotate(-90deg);opacity:0;transition:opacity .2s}
.holdRing circle{fill:none;stroke-width:6;stroke-linecap:round}.holdRing .bg{stroke:rgba(255,255,255,.08)}
.holdRing .fg{stroke:var(--red);stroke-dasharray:614;stroke-dashoffset:614}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 20px 10px}
.chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:8px 11px;font-size:11px;font-weight:600;color:#c6d0e6}
.chip .d{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green)}
.chip.blue .d{background:var(--blue);box-shadow:0 0 7px var(--blue)}.chip.off .d{background:var(--muted-2);box-shadow:none}
.sec-h{display:flex;justify-content:space-between;align-items:center;margin:16px 0 12px}.sec-h h3{font-size:14px;font-weight:700}
.sec-h a{font-size:12px;color:var(--blue);font-weight:600;text-decoration:none}
.gstrip{display:flex;gap:16px;overflow-x:auto}.gitem{display:flex;flex-direction:column;align-items:center;gap:7px;font-size:11px;color:var(--muted)}
.av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;border:2px solid rgba(255,255,255,.12);flex-shrink:0}
.b1{background:linear-gradient(135deg,#2563EB,#1e40af)}.b2{background:linear-gradient(135deg,#7c3aed,#4c1d95)}
.b3{background:linear-gradient(135deg,#0ea5e9,#0369a1)}.b4{background:linear-gradient(135deg,#e11d48,#9f1239)}.b5{background:linear-gradient(135deg,#059669,#065f46)}
.tabs{display:flex;justify-content:space-around;align-items:center;padding:12px 12px 20px;border-top:1px solid var(--line);background:rgba(10,15,30,.75);backdrop-filter:blur(8px)}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:var(--muted-2);font-weight:600;background:none;border:none}.tab.on{color:var(--blue)}
.tab .ti{font-size:19px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px}
.gcard{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px}
.gcard .meta{flex:1}.gcard .meta b{font-size:15px}.gcard .meta .role{font-size:12px;color:var(--muted)}
.badge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px}.badge.p1{background:rgba(37,99,235,.16);color:#7ea6ff}.badge.p2{background:rgba(139,152,180,.16);color:var(--muted)}
.badge.pend{background:rgba(234,179,8,.18);color:#f5c451}
.abanner{background:#0d1526;border:1px solid var(--line);border-radius:16px;padding:14px;margin-top:14px;font-size:14px;color:var(--ink)}
.abanner.ok{border-color:rgba(34,197,94,.4);color:#7ee2a8;text-align:center;font-weight:700}
.abanner .btn{width:100%}
.btn.green{background:var(--green);color:#04120a;box-shadow:0 14px 30px -12px rgba(34,197,94,.6)}
.authtabs{display:flex;background:#0d1526;border:1px solid var(--line);border-radius:14px;padding:4px;gap:4px}
.atab{flex:1;padding:11px;border:0;border-radius:10px;background:transparent;color:var(--muted);font-weight:700;font-size:14px;cursor:pointer}
.atab.on{background:var(--blue);color:#fff}
.btn.areq{width:auto;padding:9px 14px;margin:0;font-size:13px}
.grm{margin-left:10px;width:30px;height:30px;flex-shrink:0;border-radius:50%;border:1px solid var(--line-strong);background:transparent;color:var(--muted);font-size:13px;font-weight:700;line-height:1}
.grm:hover{color:var(--red);border-color:var(--red)}
/* emergency */
.etitle{display:flex;align-items:center;gap:9px;color:var(--red);font-weight:900;font-size:15px;letter-spacing:1px}
.pulse{width:10px;height:10px;border-radius:50%;background:var(--red);animation:pblink 1s infinite;box-shadow:0 0 10px var(--red)}
@keyframes pblink{0%,100%{opacity:1}50%{opacity:.35}}
#map,#wmap{height:230px;border-radius:18px;border:1px solid var(--line-strong);margin-top:10px;background:#0d1526;z-index:0}
.leaflet-container{background:#0d1526;font-family:var(--font)}
.drow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.drow:last-child{border-bottom:none}.drow .who{display:flex;align-items:center;gap:11px;font-size:14px;font-weight:600}
.drow .who .av{width:32px;height:32px;font-size:12px}.st{font-size:12px;font-weight:700}.st.ok{color:var(--green)}.st.resp{color:var(--blue)}.st.wait{color:var(--amber)}
.livechips{display:flex;gap:8px;margin-top:10px}.lc{flex:1;text-align:center;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:9px 4px}
.lc b{display:block;font-size:12px}.lc span{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}.lc .d{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}
.elapsed{text-align:center;padding:10px 0}.elapsed b{display:block;font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}.elapsed span{font-size:11px;color:var(--muted)}
.sharebox{display:flex;gap:8px;margin-top:8px}.sharebox input{margin:0;font-size:12px}.sharebox button{padding:0 16px;border-radius:14px;border:1px solid var(--line-strong);background:transparent;color:var(--ink);font-weight:700;font-size:12px}
.tl{display:flex;gap:14px;position:relative;padding-bottom:18px}.tl::before{content:"";position:absolute;left:6px;top:16px;bottom:-2px;width:2px;background:var(--line-strong)}.tl:last-child::before{display:none}
.tl .node{width:14px;height:14px;border-radius:50%;background:var(--blue);border:3px solid var(--raven);margin-top:2px;flex-shrink:0}.tl.red .node{background:var(--red)}.tl.green .node{background:var(--green)}
.tl .c b{font-size:13px}.tl .c .tm{font-size:11px;color:var(--muted);font-weight:600}.tl .c p{font-size:12px;color:#aab6d0;margin-top:2px}
.hist{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:10px}
.hist .r b{font-size:14px}.hist .r span{font-size:12px;color:var(--muted)}
.tag{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px}.tag.safe{background:rgba(34,197,94,.15);color:var(--green)}.tag.active{background:rgba(229,57,53,.15);color:var(--red)}
.splash{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px}
.splash img{width:150px;filter:drop-shadow(0 20px 40px rgba(37,99,235,.4))}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#16223c;border:1px solid var(--line-strong);color:var(--ink);padding:12px 18px;border-radius:14px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%}
.toast.show{opacity:1}
.note{font-size:11px;color:var(--amber);text-align:center;padding:6px}
.overlay{position:fixed;inset:0;background:radial-gradient(70% 50% at 50% 42%,rgba(229,57,53,.3),rgba(10,15,30,.97));display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500}
.overlay .big{font-size:150px;font-weight:900;line-height:1;text-shadow:0 0 60px rgba(229,57,53,.7)}
.overlay .say{position:absolute;top:22%;font-size:13px;letter-spacing:2px;color:#ffb4b4;text-transform:uppercase;font-weight:700}
.overlay button{position:absolute;bottom:12%;width:80%}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ---------- storage (safe: falls back to memory if localStorage blocked) ----------
const mem={};
const store={get:k=>{try{return localStorage.getItem(k)}catch{return mem[k]??null}},
  set:(k,v)=>{try{localStorage.setItem(k,v)}catch{mem[k]=v}},
  del:k=>{try{localStorage.removeItem(k)}catch{delete mem[k]}}};

// ---------- config ----------
const url=new URL(location.href);
// A base is only usable if it's a real http(s) origin. When the file is opened
// directly (file://), location.origin is the string "null" — fall back to localhost.
const cleanBase=(v)=>(v && v!=='null' && /^https?:/i.test(v))?v.replace(/\/$/,''):null;
const API = cleanBase(url.searchParams.get('api'))
         || cleanBase(store.get('raven_api'))
         || cleanBase(location.origin)
         || 'http://localhost:4000';
if(cleanBase(location.origin)||url.searchParams.get('api')) store.set('raven_api',API);
const APP_ORIGIN = cleanBase(location.origin) || API; // for building share links
const WATCH=url.searchParams.get('watch');

const S={token:store.get('raven_token'),user:null,tab:'home',
  alertId:null,watchToken:null,startTs:null,geoWatchId:null,lastPos:null,simTimer:null,detail:null,map:null,marker:null,track:null};

const app=document.getElementById('app');
const el=(h)=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstElementChild};
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

async function api(path,opts={}){
  const res=await fetch(API+path,{method:opts.method||'GET',
    headers:{'Content-Type':'application/json',...(S.token?{Authorization:'Bearer '+S.token}:{}),...(opts.headers||{})},
    body:opts.body?JSON.stringify(opts.body):undefined});
  const json=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(json.error||('HTTP '+res.status));
  return json;
}

// ================= ROUTER =================
// ================= WEB PUSH (free in-app alerts) =================
function urlB64ToUint8(base64){
  const pad='='.repeat((4-base64.length%4)%4);
  const b=(base64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(b);const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);return arr;
}
async function registerSW(){
  if(!('serviceWorker' in navigator))return null;
  try{return await navigator.serviceWorker.register('/sw.js');}catch(e){return null;}
}
const iOS=/iP(hone|ad|od)/.test(navigator.userAgent);
const standalone=window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
function refreshAlertBanner(){
  const b=document.getElementById('alertBanner');if(!b)return;
  if(!('Notification' in window)||!('serviceWorker' in navigator)){b.innerHTML='';return;}
  if(Notification.permission==='granted'){
    b.innerHTML=`<div class="abanner ok"><span>🔔 Emergency alerts are on</span></div>`;return;
  }
  if(iOS&&!standalone){
    b.innerHTML=`<div class="abanner"><b>Turn on alerts:</b> tap Share ⬆ then “Add to Home Screen”, open Raven SOS from your home screen, and enable alerts there. <span class="note" style="margin:6px 0 0">iPhone requires this one-time step.</span></div>`;return;
  }
  b.innerHTML=`<div class="abanner"><span>Get notified when someone you guard needs help.</span>
    <button class="btn blue" style="margin-top:8px" onclick="enablePush()">Turn on emergency alerts</button></div>`;
}
window.enablePush=async()=>{
  try{
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){toast('Alerts not enabled');refreshAlertBanner();return;}
    const reg=await registerSW();if(!reg){toast('Notifications unsupported here');return;}
    const {publicKey}=await api('/api/push/vapid-key');
    if(!publicKey){toast('Push not configured yet');return;}
    let sub=await reg.pushManager.getSubscription();
    if(!sub)sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8(publicKey)});
    await api('/api/push/subscribe',{method:'POST',body:sub.toJSON()});
    toast('Emergency alerts on');refreshAlertBanner();
  }catch(e){toast('Couldn’t enable: '+e.message);}
};

async function boot(){
  if(WATCH){return renderWatch();}
  if(S.token){
    try{const me=await api('/api/me');S.user=me.user;registerSW();return render();}
    catch{S.token=null;store.del('raven_token');}
  }
  renderOnboard();
}

function render(){
  if(S.alertId){return renderActive();}
  if(S.tab==='home')renderHome();
  else if(S.tab==='guardians')renderGuardians();
  else if(S.tab==='history')renderHistory();
  else renderHome();
}

function tabbar(active){
  const t=(id,ic,lbl)=>`<button class="tab ${active===id?'on':''}" onclick="go('${id}')"><div class="ti">${ic}</div>${lbl}</button>`;
  return `<div class="tabs">${t('home','⌂','Home')}${t('history','◷','History')}${t('guardians','♥','Guardians')}</div>`;
}

let authMode='login';
function authForm(){
  const login=authMode==='login';
  return `<div class="pad">
    <div class="authtabs">
      <button class="atab ${login?'on':''}" onclick="setAuthMode('login')">Log in</button>
      <button class="atab ${!login?'on':''}" onclick="setAuthMode('signup')">Sign up</button>
    </div>
    <div style="height:16px"></div>
    ${login?'':'<label>Your name</label><input id="oName" placeholder="Name"/><div style="height:12px"></div>'}
    <label>Phone number</label><input id="oPhone" placeholder="XXX-XXX-XXXX" inputmode="tel"/>
    <div style="height:12px"></div>
    <label>Password</label><input id="oPass" type="password" placeholder="${login?'Your password':'At least 6 characters'}"/>
    <div style="height:20px"></div>
    <button class="btn blue" onclick="${login?'doLogin':'doRegister'}()">${login?'Log in':'Create account'}</button>
    <div class="note" id="oErr"></div>
  </div>`;
}
window.setAuthMode=(m)=>{authMode=m;renderOnboard();};
function authErr(m){const e=document.getElementById('oErr');if(e)e.textContent=m;}
window.doRegister=async()=>{
  const nameEl=document.getElementById('oName');
  const displayName=nameEl?nameEl.value.trim():'';
  const phone=document.getElementById('oPhone').value.trim();
  const password=document.getElementById('oPass').value;
  if(!displayName||!phone||!password){authErr('Please enter your name, phone, and password.');return;}
  if(password.length<6){authErr('Password must be at least 6 characters.');return;}
  try{
    const r=await api('/api/auth/register',{method:'POST',body:{displayName,phone,password}});
    S.token=r.token;S.user=r.user;store.set('raven_token',r.token);render();
  }catch(e){authErr(e.message);}
};
window.doLogin=async()=>{
  const phone=document.getElementById('oPhone').value.trim();
  const password=document.getElementById('oPass').value;
  if(!phone||!password){authErr('Enter your phone and password.');return;}
  try{
    const r=await api('/api/auth/login',{method:'POST',body:{phone,password}});
    S.token=r.token;S.user=r.user;store.set('raven_token',r.token);render();
  }catch(e){authErr(e.message);}
};

// ---- SOS hold -> countdown -> trigger ----
function wireHold(){
  const orb=document.getElementById('orb');if(!orb)return;
  const core=document.getElementById('core'),hr=document.getElementById('hr'),fg=document.getElementById('hrfg');
  const LEN=614;let raf,holding=false,t0=0;
  const start=(e)=>{e.preventDefault();holding=true;core.querySelector('.lbl').textContent='HOLD…';core.querySelector('.sub').textContent='RELEASE TO CANCEL';
    core.style.animation='none';hr.style.opacity='1';t0=performance.now();
    (function tick(now){if(!holding)return;const p=Math.min((now-t0)/1400,1);fg.style.strokeDashoffset=LEN*(1-p);
      if(p>=1){holding=false;countdown();return;}raf=requestAnimationFrame(tick);})(t0);};
  const cancel=()=>{if(!holding)return;holding=false;cancelAnimationFrame(raf);hr.style.opacity='0';fg.style.strokeDashoffset=LEN;
    core.style.animation='';core.querySelector('.lbl').textContent='SOS';core.querySelector('.sub').textContent='HOLD 3S';};
  orb.addEventListener('pointerdown',start);window.addEventListener('pointerup',cancel);
}
function countdown(){
  let n=3;const ov=el(`<div class="overlay"><div class="say">Alerting your guardians</div><div class="big">${n}</div><button class="btn ghost" id="cancelCd">Cancel</button></div>`);
  document.body.appendChild(ov);
  let stop=false;ov.querySelector('#cancelCd').onclick=()=>{stop=true;ov.remove();render();};
  const iv=setInterval(()=>{if(stop){clearInterval(iv);return;}n--;if(n<=0){clearInterval(iv);ov.remove();triggerAlert();return;}ov.querySelector('.big').textContent=n;},800);
}

// ---- trigger a real alert ----
async function triggerAlert(){
  toast('Sending alert…');
  const pos=await quickFix();
  const body={lat:pos.lat,lng:pos.lng,accuracyM:pos.acc,address:pos.addr,triggerType:'manual',origin:APP_ORIGIN};
  try{
    const r=await api('/api/alerts',{method:'POST',headers:{'Idempotency-Key':'web-'+Date.now()},body});
    S.alertId=r.alert.id;S.watchToken=r.watchToken;S.startTs=Date.now();
    toast('Alert sent to '+r.notifiedTier1+' guardians');
    startStreaming();renderActive();
  }catch(e){toast('Failed: '+e.message);}
}

// best-effort browser geolocation; falls back to a simulated point
function quickFix(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation)return resolve(sim());
    navigator.geolocation.getCurrentPosition(
      p=>resolve({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy,addr:null}),
      ()=>resolve(sim()),{enableHighAccuracy:true,timeout:4000});
  });
}
function sim(){S._sim=S._sim||{lat:34.0195,lng:-118.4912};return {lat:S._sim.lat,lng:S._sim.lng,acc:12,addr:'Santa Monica, CA (simulated)'};}
function startStreaming(){
  const send=(lat,lng,acc,spd,hd)=>{S.lastPos={lat,lng};api('/api/alerts/'+S.alertId+'/pings',{method:'POST',body:{lat,lng,accuracyM:acc,speedMps:spd,headingDeg:hd}}).catch(()=>{});};
  if(navigator.geolocation){
    S.geoWatchId=navigator.geolocation.watchPosition(
      p=>send(p.coords.latitude,p.coords.longitude,p.coords.accuracy,p.coords.speed,p.coords.heading),
      ()=>startSim(send),{enableHighAccuracy:true});
  }else startSim(send);
}
function startSim(send){ // simulate movement NE if no real GPS
  let {lat,lng}=sim();let i=0;
  S.simTimer=setInterval(()=>{i++;lat+=0.0006;lng+=0.0007;send(lat,lng,8,3,45);if(i>40)clearInterval(S.simTimer);},1500);
}
function stopStreaming(){if(S.geoWatchId!=null)navigator.geolocation.clearWatch(S.geoWatchId);if(S.simTimer)clearInterval(S.simTimer);S.geoWatchId=null;S.simTimer=null;}

    ${header()}
    <div class="pad">
      <div class="etitle"><span class="pulse"></span> EMERGENCY ACTIVE</div>
      <div style="font-size:20px;font-weight:800;margin-top:6px">${S.user.displayName}</div>
      <div style="font-size:12px;color:var(--muted)" id="addr">Locating…</div>
      <div id="map"></div>
      <div class="elapsed"><b id="elapsed">00:00</b><span>elapsed</span></div>
      <div id="delivery"></div>
      <div class="livechips">
        <div class="lc"><b><span class="d" style="background:var(--green)"></span>GPS</b><span>Streaming</span></div>
        <div class="lc"><b><span class="d" style="background:var(--red)"></span>Audio</b><span>Standby</span></div>
        <div class="lc"><b><span class="d" style="background:var(--blue)"></span>Guardians</b><span id="ackCount">0 acked</span></div>
      </div>
      <div class="sec-h" style="margin-bottom:6px"><h3>Guardian watch link</h3></div>
      <div class="sharebox"><input id="shareUrl" value="${shareUrl}" readonly/><button onclick="copyShare()">Copy</button></div>
      <div style="height:16px"></div>
      <button class="btn blue" onclick="resolveAlert()">I'm safe — end alert</button>
    </div>
  </div>`));
  initMap('map');
  connectOwnerWs();
  pollDetail();
  tickElapsed();
}
window.copyShare=()=>{const i=document.getElementById('shareUrl');i.select();try{document.execCommand('copy')}catch{}
  navigator.clipboard?.writeText(i.value).catch(()=>{});toast('Watch link copied');};

let elapsedTimer;
function tickElapsed(){clearInterval(elapsedTimer);elapsedTimer=setInterval(()=>{const s=Math.floor((Date.now()-S.startTs)/1000);
  const el2=document.getElementById('elapsed');if(!el2){clearInterval(elapsedTimer);return;}
  el2.textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');},500);}

function connectOwnerWs(){
  const wsBase=API.replace(/^http/,'ws');
  const ws=new WebSocket(`${wsBase}/ws?alertId=${S.alertId}&token=${S.token}`);
  ws.onmessage=(e)=>{const m=JSON.parse(e.data);
    if(m.type==='snapshot'&&m.pings?.length){m.pings.forEach(p=>plot(p.lat,p.lng));}
    if(m.type==='ping'){plot(m.ping.lat,m.ping.lng);const a=document.getElementById('addr');if(a)a.textContent=`Live · ${m.ping.lat.toFixed(5)}, ${m.ping.lng.toFixed(5)}`;}
  };
  S.ws=ws;
}
let detailTimer;
function pollDetail(){clearInterval(detailTimer);const run=async()=>{
  try{const d=await api('/api/alerts/'+S.alertId);renderDelivery(d);}catch{}};run();detailTimer=setInterval(run,3000);}
async function renderDelivery(d){
  let guardians=[];try{guardians=await api('/api/guardians');}catch{}
  const gmap={};guardians.forEach(g=>gmap[g.id]=g);
  const byRecip={};(d.notifications||[]).forEach(n=>{const c=byRecip[n.recipientId]||{name:gmap[n.recipientId]?.name||'Guardian',status:'sent'};
    if(n.status==='acknowledged')c.status='acknowledged';byRecip[n.recipientId]=c;});
  const rows=Object.values(byRecip).map((c,i)=>`<div class="drow"><div class="who"><div class="av b${(i%5)+1}">${c.name[0]}</div>${c.name}</div>
    <div class="st ${c.status==='acknowledged'?'resp':'ok'}">${c.status==='acknowledged'?'● Responding':'✓ Delivered'}</div></div>`).join('')
    +`<div class="drow"><div class="who"><div class="av b5">911</div>Emergency services</div><div class="st wait">${d.alert.dispatched911?'✓ Dispatched':'Standby'}</div></div>`;
  const box=document.getElementById('delivery');if(box)box.innerHTML=rows;
  const acked=Object.values(byRecip).filter(c=>c.status==='acknowledged').length;
  const ac=document.getElementById('ackCount');if(ac)ac.textContent=acked+' acked';
}
window.resolveAlert=async()=>{
  try{await api('/api/alerts/'+S.alertId+'/resolve',{method:'POST',body:{resolution:'safe'}});}catch{}
  stopStreaming();clearInterval(detailTimer);clearInterval(elapsedTimer);S.ws?.close();
  S.alertId=null;S.watchToken=null;toast('You are marked safe');render();
};

// ================= MAPS =================
function initMap(id){
  const c=S.lastPos||sim();
  S.map=L.map(id,{zoomControl:false,attributionControl:false}).setView([c.lat,c.lng],16);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:20}).addTo(S.map);
  S.track=L.polyline([],{color:'#2563EB',weight:4,opacity:.9}).addTo(S.map);
  S.marker=L.circleMarker([c.lat,c.lng],{radius:9,color:'#fff',weight:3,fillColor:'#2563EB',fillOpacity:1}).addTo(S.map);
}
function plot(lat,lng){if(!S.map)return;S.marker.setLatLng([lat,lng]);S.track.addLatLng([lat,lng]);S.map.panTo([lat,lng]);}

// ================= GUARDIANS =================
async function renderGuardians(){
  let guardians=[],requests=[];
  try{guardians=await api('/api/guardians');}catch{}
  try{const r=await api('/api/requests');requests=r.requests||[];}catch{}
  app.innerHTML='';
  const code=(S.user&&S.user.inviteCode)||'—';
  const reqCards=requests.map(r=>`<div class="gcard">
    <div class="av b3">${(r.ownerName||'?')[0]}</div>
    <div class="meta"><b>${r.ownerName}</b><div class="role">wants you as a guardian</div></div>
    <button class="btn green areq" onclick="respondReq('${r.id}',true)">Accept</button>
    <button class="grm" onclick="respondReq('${r.id}',false)">✕</button></div>`).join('');
  const reqSection=requests.length?`<div class="sec-h"><h3 style="font-size:18px;font-weight:800">Requests</h3></div>${reqCards}<div style="height:16px"></div>`:'';
  const cards=guardians.map((g,i)=>{
    const pending=g.status==='pending';
    const badge=pending?`<div class="badge pend">PENDING</div>`:`<div class="badge ${g.priorityTier===1?'p1':'p2'}">TIER ${g.priorityTier}</div>`;
    return `<div class="gcard"><div class="av b${(i%5)+1}">${(g.name||'?')[0]}</div>
      <div class="meta"><b>${g.name}</b><div class="role">${pending?'Waiting to accept':(g.relationship||'Guardian')}</div></div>
      ${badge}
      <button class="grm" onclick="removeGuardian('${g.id}','${(g.name||'').replace(/'/g,"")}')">✕</button></div>`;
  }).join('')||'<div style="color:var(--muted);text-align:center;padding:30px">No guardians yet.</div>';
  app.appendChild(el(`<div class="content">
    ${header()}
    <div class="pad">
      <div class="sec-h"><h3 style="font-size:22px;font-weight:800">Guardians</h3></div>
      ${reqSection}
      ${cards}
      <div class="card" style="margin-top:8px">
        <label>Add a guardian</label>
        <input id="gName" placeholder="Name"/>
        <input id="gPhone" placeholder="Phone (+1…) or invite code"/>
        <div style="display:flex;gap:8px;margin-top:8px">
          <input id="gRel" placeholder="Relationship" style="margin:0"/>
          <select id="gTier" style="width:120px;padding:14px;border-radius:14px;background:#0d1526;color:var(--ink);border:1px solid var(--line)">
            <option value="1">Tier 1</option><option value="2">Tier 2</option></select>
        </div>
        <div style="height:12px"></div>
        <button class="btn blue" onclick="addGuardian()">Add guardian</button>
        <div class="note">If they're a Raven SOS user, they'll get a request to accept before they're active.</div>
      </div>
      <div class="card" style="margin-top:12px;text-align:center">
        <label>Your invite code</label>
        <div style="font-size:26px;font-weight:900;letter-spacing:4px;color:var(--blue);margin-top:4px">${code}</div>
        <div class="note" style="text-align:center">Share this so others can add you as their guardian.</div>
      </div>
    </div>
    <div style="flex:1"></div>
    ${tabbar('guardians')}
  </div>`));
}
window.respondReq=async(id,accept)=>{
  try{await api('/api/requests/'+id+'/'+(accept?'accept':'decline'),{method:'POST'});
    toast(accept?'You are now their guardian':'Request declined');renderGuardians();}
  catch(e){toast('Failed: '+e.message);}
};
window.removeGuardian=async(id,name)=>{
  if(!confirm('Remove '+(name||'this guardian')+' from your network?'))return;
  try{await api('/api/guardians/'+id,{method:'DELETE'});toast('Guardian removed');renderGuardians();}
  catch(e){toast('Failed: '+e.message);}
};
window.addGuardian=async()=>{
  const name=document.getElementById('gName').value.trim();
  const q=document.getElementById('gPhone').value.trim();
  const rel=document.getElementById('gRel').value.trim();
  const tier=Number(document.getElementById('gTier').value);
  if(!q){toast('Enter a phone number or invite code');return;}
  let phone=q,foundName=null;
  try{const f=await api('/api/users/find?q='+encodeURIComponent(q));if(f&&f.user){phone=f.user.phone;foundName=f.user.displayName;}}catch{}
  const finalName=name||foundName;
  if(!finalName){toast('Please enter a name');return;}
  try{
    const g=await api('/api/guardians',{method:'POST',body:{name:finalName,phone,relationship:rel,priorityTier:tier}});
    toast(g.status==='pending'?'Request sent — waiting for them to accept':'Guardian added');
    renderGuardians();
  }catch(e){toast('Failed: '+e.message);}
};

// ================= HISTORY =================
async function renderHistory(){
  let alerts=[];try{const r=await api('/api/alerts');alerts=r.alerts;}catch{}
  app.innerHTML='';
  const rows=alerts.map(a=>{const d=new Date(a.triggeredAt);const safe=a.status==='resolved';
    return `<div class="hist" onclick="openIncident('${a.id}')"><div class="r"><b>${a.originAddress||'Alert'}</b>
      <span>${d.toLocaleString()}</span></div><div class="tag ${safe?'safe':'active'}">${safe?'RESOLVED':a.status.toUpperCase()}</div></div>`;}).join('')
    ||'<div style="color:var(--muted);text-align:center;padding:30px">No incidents yet. Stay safe.</div>';
  app.appendChild(el(`<div class="content">${header()}
    <div class="pad"><div class="sec-h"><h3 style="font-size:22px;font-weight:800">History</h3></div>${rows}</div>
    <div style="flex:1"></div>${tabbar('history')}</div>`));
}
window.openIncident=async(id)=>{
  let d;try{d=await api('/api/alerts/'+id);}catch{return;}
  const a=d.alert;const t=(iso)=>new Date(iso).toLocaleTimeString();
  const events=[['red',t(a.triggeredAt),'Alert triggered',(a.originAddress||'location')]];
  (d.notifications?.length)&&events.push(['',t(a.triggeredAt),'Guardians notified',d.notifications.length+' messages sent']);
  d.notifications?.filter(n=>n.status==='acknowledged').slice(0,1).forEach(()=>events.push(['green',t(a.triggeredAt),'Guardian responded','Acknowledged the alert']));
  a.dispatched911&&events.push(['',t(a.triggeredAt),'911 connected','Relayed via RapidSOS bridge']);
  (d.media?.length)&&events.push(['',t(a.triggeredAt),'Evidence uploaded',d.media.length+' segment(s) sealed']);
  a.resolvedAt&&events.push(['green',t(a.resolvedAt),'Marked safe','Resolved: '+(a.resolution||'safe')]);
  const tl=events.map(([cls,tm,title,p])=>`<div class="tl ${cls}"><div class="node"></div><div class="c"><div class="tm">${tm}</div><b>${title}</b><p>${p}</p></div></div>`).join('');
  app.innerHTML='';
  app.appendChild(el(`<div class="content">${header()}
    <div class="pad"><div class="sec-h"><h3 style="font-size:20px;font-weight:800">Incident</h3><a onclick="go('history')">Back</a></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">${new Date(a.triggeredAt).toLocaleString()} · ${d.pings.length} location updates</div>
    ${tl}</div></div>`));
};
